<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Task Manager</h1>
    <p>Gestioneaza sarcinile tale eficient</p>
  </header>

  <main>
    <div class="form-container">
      <h2>Adauga un Task Nou</h2>
      <input type="text" id="taskInput" placeholder="Scrie un task...">
      <input type="text" id="authorInput" placeholder="Numele tau...">
      <button id="addBtn" type="button" onclick="addTask()">Adauga Task</button>
    </div>

    <div class="list-container">
      <h2>Lista de Task-uri</h2>
      <ul id="taskList"></ul>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
